services:
  assistant:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_PATH=/data/assistant.db
      - INDEX_PATH=/data/rag_index
    volumes:
      - assistant-data:/data
    restart: unless-stopped
    # Lambda base image's CMD is JSON-handler-style, not a shell command —
    # override it for local dev to run a real uvicorn server with reload.
    entrypoint: []
    command: ["python", "-m", "uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  assistant-data:
    driver: local
